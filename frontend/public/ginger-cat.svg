<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Ears -->
  <polygon points="18,38 10,12 36,28" fill="#e85d04"/>
  <polygon points="22,37 16,18 34,29" fill="#f9c784"/>
  <polygon points="82,38 90,12 64,28" fill="#e85d04"/>
  <polygon points="78,37 84,18 66,29" fill="#f9c784"/>
  <!-- Head -->
  <ellipse cx="50" cy="52" rx="34" ry="30" fill="#f97316"/>
  <!-- Forehead stripes -->
  <path d="M38,30 Q50,24 62,30" stroke="#c2410c" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M42,25 Q50,20 58,25" stroke="#c2410c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Eyes -->
  <ellipse cx="37" cy="50" rx="7" ry="8" fill="#1a1a2e"/>
  <ellipse cx="63" cy="50" rx="7" ry="8" fill="#1a1a2e"/>
  <ellipse cx="38" cy="50" rx="3" ry="6" fill="#10b981"/>
  <ellipse cx="64" cy="50" rx="3" ry="6" fill="#10b981"/>
  <circle cx="36" cy="48" r="1.5" fill="white"/>
  <circle cx="62" cy="48" r="1.5" fill="white"/>
  <!-- Nose -->
  <ellipse cx="50" cy="61" rx="4" ry="3" fill="#e85d04"/>
  <!-- Mouth -->
  <path d="M46,64 Q50,69 54,64" stroke="#c2410c" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Whiskers left -->
  <line x1="16" y1="58" x2="42" y2="62" stroke="#7c2d12" stroke-width="1" opacity="0.6"/>
  <line x1="14" y1="63" x2="42" y2="64" stroke="#7c2d12" stroke-width="1" opacity="0.6"/>
  <line x1="16" y1="68" x2="42" y2="66" stroke="#7c2d12" stroke-width="1" opacity="0.6"/>
  <!-- Whiskers right -->
  <line x1="84" y1="58" x2="58" y2="62" stroke="#7c2d12" stroke-width="1" opacity="0.6"/>
  <line x1="86" y1="63" x2="58" y2="64" stroke="#7c2d12" stroke-width="1" opacity="0.6"/>
  <line x1="84" y1="68" x2="58" y2="66" stroke="#7c2d12" stroke-width="1" opacity="0.6"/>
  <!-- Chin patch -->
  <ellipse cx="50" cy="74" rx="14" ry="8" fill="#f9c784" opacity="0.7"/>
  <!-- Cheek patches -->
  <ellipse cx="30" cy="62" rx="8" ry="5" fill="#f9c784" opacity="0.5"/>
  <ellipse cx="70" cy="62" rx="8" ry="5" fill="#f9c784" opacity="0.5"/>
